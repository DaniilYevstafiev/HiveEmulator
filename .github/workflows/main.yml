name: Hive Emulator CI/CD

on:
  push:
    branches: [main, dev]
  workflow_dispatch:

jobs:
  security-scan:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Snyk Security Check
        uses: snyk/actions/dotnet@master
        env:
          SNYK_TOKEN: ${{ secrets.SNYK_TOKEN }}

  build-dotnet:
    needs: security-scan
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "8.0.x"
      - name: Restore & Build
        run: dotnet build src/CommunicationControl/DevOpsProject.sln --configuration Release
      - name: Test
        run: dotnet test src/CommunicationControl/DevOpsProject.sln --no-build

  build-and-push:
    needs: build-dotnet
    runs-on: ubuntu-latest
    if: github.event_name == 'push'
    outputs:
      registry: ${{ steps.login-ecr.outputs.registry }}
    steps:
      - uses: actions/checkout@v4
      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ secrets.AWS_REGION }}

      - name: Login to Amazon ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2

      - name: Build and Push Images
        env:
          REGISTRY: ${{ steps.login-ecr.outputs.registry }}
          TAG: ${{ github.sha }}
        run: |
          # Сборка 3-х сервисов проекта
          docker build -t $REGISTRY/hive-com-control:$TAG -f src/CommunicationControl/DevOpsProject/Dockerfile .
          docker build -t $REGISTRY/hive-map-client:$TAG -f src/MapClient/Dockerfile .
          docker build -t $REGISTRY/hive-mind:$TAG -f src/CommunicationControl/DevOpsProject.HiveMind.API/Dockerfile .

          docker push $REGISTRY/hive-com-control:$TAG
          docker push $REGISTRY/hive-map-client:$TAG
          docker push $REGISTRY/hive-mind:$TAG

  deploy:
    needs: build-and-push
    runs-on: ubuntu-latest
    steps:
      - name: SSH Deploy
        uses: appleboy/ssh-action@master
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ec2-user
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          script: |
            cd ~/hive-emulator

            # Авторизация в ECR на сервере
            aws ecr get-login-password --region ${{ secrets.AWS_REGION }} | docker login --username AWS --password-stdin ${{ needs.build-and-push.outputs.registry }}

            # Определение портов для Git Flow
            if [ "${{ github.ref }}" == "refs/heads/main" ]; then
              export COM_PORT=8080
              export MAP_PORT=3000
              export HIVE_PORT=5149
              export PROJ_NAME="hive-prod"
            else
              export COM_PORT=8081
              export MAP_PORT=3001
              export HIVE_PORT=5150
              export PROJ_NAME="hive-dev"
            fi

            export REGISTRY=${{ needs.build-and-push.outputs.registry }}
            export TAG=${{ github.sha }}

            # Запуск
            docker-compose -p $PROJ_NAME up -d --pull always
