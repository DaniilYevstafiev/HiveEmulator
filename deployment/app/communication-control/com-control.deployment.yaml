apiVersion: apps/v1
kind: Deployment
metadata:
  name: com-control
  namespace: default
spec:
  replicas: 1
  selector:
    matchLabels:
      app: com-control
  template:
    metadata:
      labels:
        app: com-control
    spec:
      containers:
        - name: com-control
          image: 876128526576.dkr.ecr.us-east-1.amazonaws.com/hiveemulator/communication-control:latest
          imagePullPolicy: Always
          ports:
            - containerPort: 8080
          env:
            - name: Redis__ConnectionString
              value: "redis:6379"
---
apiVersion: v1
kind: Service
metadata:
  name: com-control
spec:
  selector:
    app: com-control
  ports:
    - protocol: TCP
      port: 8080
      targetPort: 8080
