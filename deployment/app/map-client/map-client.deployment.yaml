apiVersion: apps/v1
kind: Deployment
metadata:
  name: map-client
  namespace: default
spec:
  replicas: 1
  selector:
    matchLabels:
      app: map-client
  template:
    metadata:
      labels:
        app: map-client
    spec:
      containers:
        - name: map-client
          image: 876128526576.dkr.ecr.us-east-1.amazonaws.com/hiveemulator/map-client:latest
          imagePullPolicy: Always
          ports:
            - containerPort: 80
---
apiVersion: v1
kind: Service
metadata:
  name: map-client
spec:
  selector:
    app: map-client
  ports:
    - protocol: TCP
      port: 80
      targetPort: 80
